      ["Armenian Premier", "Andranik", "Urartu", "Urartu WIN", "79%", "Urartu title contenders.", "4.50 · 3.60 · 1.70", true],
      ["Bosnian Premier", "Zrinjski Mostar", "Radnik Bijeljina", "Zrinjski WIN", "76%", "Title holders.", "1.45 · 3.80 · 7.00", true],
      ["Bulgarian 1st", "Arda", "Ludogorets", "Ludogorets WIN", "81%", "Champions' class.", "4.00 · 3.50 · 1.80", true],
      ["Spain U19", "Barcelona U19", "Gimnastic Manresa", "Barca WIN", "88%", "La Masia quality.", "1.10 · 7.00 · 15.00", true],
      ["Serbia U19", "Crvena Zvezda U19", "Mladost Lucani", "Zvezda WIN", "82%", "Academy dominance.", "1.25 · 5.00 · 8.50", true],
      ["U19 W Euro", "Switzerland U19 W", "England U19 W", "England WIN", "84%", "Lionesses depth.", "3.00 · 3.40 · 2.15", true]
    ];

    const matches = MatchData.map(([league, home, away, pred, conf, tip, odds, banker]) => ({
      league, home, away, pred, conf, tip, odds, banker
    }));

    // ==================== STATE ====================
    const State = {
      view: 'grouped',
      league: 'all',
      page: 'predictions',
      listeners: [],
      subscribe(fn) { this.listeners.push(fn); },
      set(key, value) { this[key] = value; this.listeners.forEach(fn => fn(this)); }
    };

    // ==================== COMPUTED ====================
    const Computed = {
      leagues() {
        const groups = matches.reduce((acc, m) => (acc[m.league] = [...(acc[m.league] || []), m], acc), {});
        const order = ['UCL', 'Copa Libertadores', 'Copa Sudamericana', 'Copa do Brasil', 'CONCACAF Champions', 'US Open Cup', 'WCQ', 'AFC Champions'];
        return Object.keys(groups).sort((a, b) => (order.indexOf(a) === -1 ? 999 : order.indexOf(a)) - (order.indexOf(b) === -1 ? 999 : order.indexOf(b)) || a.localeCompare(b))
          .map(name => ({ name, matches: groups[name] }));
      },
      bankers: () => matches.filter(m => m.banker),
      avgConf: () => Math.round(matches.reduce((s, m) => s + parseInt(m.conf) || 0, 0) / matches.length),
      filtered: (league) => league === 'all' ? matches : matches.filter(m => m.league === league)
    };

    // ==================== RENDERER ====================
    const Renderer = {
      card(m) {
        const getTag = (isHome) => m.pred.includes('WIN') ? (isHome ? 'HOME' : 'AWAY') : (m.pred.includes('Draw') ? 'DRAW' : (isHome ? 'HOME' : 'AWAY'));
        return `<div class="match-card ${m.banker ? 'banker' : ''}">
          ${m.banker ? '<span class="banker-icon"><i class="fas fa-gem"></i> BANKER</span>' : ''}
          <div class="card-header"><span class="league-tag"><i class="fas fa-tag"></i> ${m.league}</span><span class="confidence-badge"><i class="fas fa-shield-alt"></i> ${m.conf}</span></div>
          <div class="teams">
            <div class="team-row"><span class="team-name"><i class="fas fa-home"></i> ${m.home}</span><span class="prediction-tag">${getTag(true)}</span></div>
            <div class="team-row"><span class="team-name"><i class="fas fa-flag"></i> ${m.away}</span><span class="prediction-tag">${getTag(false)}</span></div>
          </div>
          <div class="outcome-row"><span class="outcome-label">Prediction</span><span class="outcome-value">${m.pred}</span></div>
          <div class="human-factor" data-tip="${m.tip}"><i class="fas fa-user-astronaut"></i> <span class="tooltip-hover">irrational edge</span></div>
          <div class="odds-row"><span>1X2: ${m.odds}</span><span>O/U 2.5</span></div>
        </div>`;
      },

      predictions(state) {
        const filtered = Computed.filtered(state.league);
        if (state.view === 'all') return `<div class="matches-grid">${filtered.map(m => this.card(m)).join('')}</div>`;
        if (state.view === 'bankers') return `<div class="matches-grid">${Computed.bankers().filter(m => state.league === 'all' || m.league === state.league).map(m => this.card(m)).join('')}</div>`;
        const leagues = Computed.leagues().filter(l => state.league === 'all' || l.name === state.league);
        return leagues.map(l => `
          <div class="league-section">
            <div class="league-header">
              <div class="league-title"><i class="fas fa-trophy"></i> ${l.name}<span class="league-count">${l.matches.length} matches · ${l.matches.filter(m => m.banker).length} bankers</span></div>
              <button class="collapse-btn" onclick="this.closest('.league-section').querySelector('.matches-grid').classList.toggle('collapsed')"><i class="fas fa-chevron-up"></i></button>
            </div>
            <div class="matches-grid">${l.matches.map(m => this.card(m)).join('')}</div>
          </div>
        `).join('');
      },

      multibets() {
        const groups = [
          { name: '🏆 CONMEBOL Power', risk: 'low', indices: [0,1,9,10,11,14,16,17], note: 'Altitude & home advantage.' },
          { name: '⚡ European Bankers', risk: 'low', indices: [23,52,54,60,61,62,63,64], note: 'Quality mismatches.' },
          { name: '🇺🇸 US Open Cup', risk: 'low', indices: [28,29,30,31,32,33,35,39], note: 'MLS vs lower divisions.' },
          { name: '🌍 Global Value', risk: 'med', indices: [2,3,4,5,24,44,45,48], note: 'Form and travel edges.' }
        ];
        return `<div class="multibet-grid">${groups.map(g => {
          const legs = g.indices.map(i => matches[i]).filter(m => m);
          const totalOdds = legs.reduce((acc, m) => acc * parseFloat(m.odds.split('·')[0] || 2), 1);
          return `<div class="multibet-card">
            <div class="multibet-header"><div class="multibet-title"><i class="fas fa-ticket-alt"></i> ${g.name}</div><span class="risk-${g.risk}">${g.risk.toUpperCase()}</span></div>
            <div class="leg-list">${legs.map(m => `<div class="leg-item"><span>${m.home} vs ${m.away} ${m.banker?'<i class="fas fa-star" style="color:#2ecc71; margin-left:4px;"></i>':''}</span><span><span class="leg-pick">${m.pred}</span> <span class="leg-odds">${m.odds.split('·')[0]}</span></span></div>`).join('')}</div>
            <div style="font-size:13px; color:#7c93bb; margin:8px 0;"><i class="far fa-lightbulb"></i> ${g.note}</div>
            <div class="multibet-footer"><div class="total-odds"><span style="color:#8b9ec2; font-size:12px;">COMBINED</span><div class="total-odds-value">${totalOdds.toFixed(2)}</div></div><span>${g.risk === 'low' ? '⭐ Medium-High' : '⚠️ Medium'}</span></div>
          </div>`;
        }).join('')}</div>`;
      },

      analysis() {
        const bankers = Computed.bankers();
        const byLeague = Computed.leagues().map(l => ({ name: l.name, total: l.matches.length, bankers: l.matches.filter(m => m.banker).length }));
        return `<div class="analysis-grid">
          <div class="analysis-card"><div class="analysis-title"><i class="fas fa-gem" style="color:#2ecc71;"></i> Top Bankers</div><div class="banker-list">${bankers.slice(0,8).map(m => `<div class="banker-item"><span>${m.home} vs ${m.away}</span><span style="color:#6fcf97;">${m.conf}</span></div>`).join('')}</div></div>
          <div class="analysis-card"><div class="analysis-title"><i class="fas fa-chart-bar"></i> Confidence Distribution</div>${['80%+','70-79%','60-69%'].map(r => { const cnt = matches.filter(m => { const c = parseInt(m.conf); return r === '80%+' ? c >= 80 : r === '70-79%' ? c >= 70 && c < 80 : c < 70; }).length; return `<div style="margin:12px 0;"><span>${r}</span><div class="confidence-bar"><div class="confidence-fill" style="width:${(cnt/matches.length)*100}%"></div></div><span style="color:#7c93bb;">${cnt} matches</span></div>`; }).join('')}</div>
          <div class="analysis-card"><div class="analysis-title"><i class="fas fa-trophy"></i> Leagues</div>${byLeague.sort((a,b) => b.total - a.total).slice(0,6).map(l => `<div style="display:flex; justify-content:space-between; padding:8px 0;"><span>${l.name}</span><span>${l.total} <span style="color:#6fcf97;">(${l.bankers}⭐)</span></span></div>`).join('')}</div>
        </div>`;
      },

      updateStats() {
        document.getElementById('totalMatches').textContent = matches.length;
        document.getElementById('bankerCount').textContent = Computed.bankers().length;
        document.getElementById('leagueCount').textContent = Computed.leagues().length;
        document.getElementById('avgConf').innerHTML = `${Computed.avgConf()}<small>%</small>`;
      },

      syncUI(state) {
        document.querySelectorAll('#pageNav .nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page === state.page));
        document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === `page-${state.page}`));
        document.querySelectorAll('#viewToggle .view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === state.view));
        document.getElementById('leagueSelect').value = state.league;
      }
    };

    // ==================== CONTROLLER ====================
    const Controller = {
      init() {
        Renderer.updateStats();

        const select = document.getElementById('leagueSelect');
        select.innerHTML = `<option value="all">🌍 ALL LEAGUES (${matches.length} matches)</option>` +
          Computed.leagues().map(l => `<option value="${l.name}">${l.name} (${l.matches.length})</option>`).join('');

        document.getElementById('viewToggle').innerHTML = `
          <button class="view-btn active" data-view="grouped"><i class="fas fa-layer-group"></i> Grouped</button>
          <button class="view-btn" data-view="all"><i class="fas fa-list"></i> All</button>
          <button class="view-btn" data-view="bankers"><i class="fas fa-gem"></i> Bankers</button>
        `;

        this.attachEvents();
        State.subscribe(state => {
          if (state.page === 'predictions') document.getElementById('predictionsContent').innerHTML = Renderer.predictions(state);
          else if (state.page === 'multibets') document.getElementById('multibetsContent').innerHTML = Renderer.multibets();
          else if (state.page === 'analysis') document.getElementById('analysisContent').innerHTML = Renderer.analysis();
          Renderer.syncUI(state);
        });
        State.set('page', 'predictions');
      },

      attachEvents() {
        document.getElementById('pageNav').addEventListener('click', e => {
          const tab = e.target.closest('.nav-tab');
          if (tab) State.set('page', tab.dataset.page);
        });
        document.getElementById('leagueSelect').addEventListener('change', e => State.set('league', e.target.value));
        document.getElementById('viewToggle').addEventListener('click', e => {
          const btn = e.target.closest('.view-btn');
          if (btn) State.set('view', btn.dataset.view);
        });
      }
    };

    Controller.init();
  })();
</script>
</body>
</html>
